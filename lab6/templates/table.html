<!DOCTYPE html>
<html>
<head>
    <title>Таблица данных</title>
</head>
<body>
    <h1>Таблица пользователей</h1>
    <table border="1" cellpadding="5">
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Возраст</th>
        </tr>
        {% for row in data %}
        <tr>
            <td>{{ row.id }}</td>
            <td>{{ row.name }}</td>
            <td>{{ row.age }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
