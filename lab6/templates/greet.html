<!DOCTYPE html>
<html>
<head>
    <title>Приветствие</title>
</head>
<body>
    <h1>Введите своё имя:</h1>
    <form method="post">
        <input type="text" name="name" placeholder="Ваше имя">
        <button type="submit">Отправить</button>
    </form>
    {% if name %}
        <h2>Привет, {{ name }}!</h2>
    {% endif %}
</body>
</html>
